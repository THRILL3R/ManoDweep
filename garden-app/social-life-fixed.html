/* Title */
#title-bar {
  position:absolute; top:14px; left:0; right:0;
  text-align:center; z-index:20; pointer-events:none;
}
#title-bar h1 {
  font-family:'Baloo 2',cursive; font-size:26px; font-weight:800;
  color:#fff;
  text-shadow: 0 2px 14px rgba(0,0,0,.9), 0 0 40px rgba(255,220,80,.3);
  line-height:1.15;
}
#title-bar p {
  font-size:12px; color:#ddf0ff; font-style:italic;
  text-shadow:0 1px 6px rgba(0,0,0,.9); margin-top:2px;
}

/* Help button */
#help-btn {
  position:absolute; top:14px; left:14px; z-index:30;
  width:36px; height:36px;
  background:rgba(20,12,5,.6);
  border:1.5px solid rgba(255,200,80,.4);
  border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:#f5d890; font-family:'Baloo 2',cursive;
  font-size:20px; font-weight:800;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  transition: background .2s;
}
#help-btn:hover { background:rgba(60,38,16,.85); }

/* Person avatar bubble */
.person-bubble {
  position:absolute;
  width:52px; height:52px;
  border-radius:50%; overflow:hidden;
  cursor:pointer; z-index:15;
  border:3px solid rgba(255,255,255,.85);
  box-shadow:0 3px 14px rgba(0,0,0,.7), 0 0 0 2px rgba(255,255,255,.1);
  transition:transform .2s, box-shadow .2s;
  /* translate(-50%,-50%) so left/top is the center point */
  transform:translate(-50%,-50%);
  background:#a0c8a0;
}
.person-bubble:hover {
  transform:translate(-50%,-50%) scale(1.25);
  box-shadow:0 6px 24px rgba(0,0,0,.8), 0 0 20px rgba(255,220,80,.6);
  z-index:25;
}
.person-bubble img { width:100%; height:100%; object-fit:cover; display:block; }
.bname {
  position:absolute; bottom:-20px; left:50%;
  transform:translateX(-50%);
  color:#fff; font-size:10px; font-weight:800;
  white-space:nowrap; pointer-events:none;
  text-shadow:0 1px 6px #000, 0 0 12px #000;
}
.ring-close    { border-color:rgba(255,130,170,.95); box-shadow:0 3px 14px rgba(0,0,0,.6),0 0 16px rgba(255,130,170,.6); }
.ring-somewhat { border-color:rgba(255,215,60,.95);  box-shadow:0 3px 14px rgba(0,0,0,.6),0 0 16px rgba(255,215,60,.5); }
.ring-farther  { border-color:rgba(100,225,140,.95); box-shadow:0 3px 14px rgba(0,0,0,.6),0 0 16px rgba(100,225,140,.5); }

/* Me label */
#me-label {
  position:absolute; z-index:16;
  background:rgba(255,255,255,.93);
  color:#2a1e0e; font-size:11px; font-weight:800;
  padding:3px 10px; border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  transform:translate(-50%,-50%);
  pointer-events:none;
}
#me-label::after {
  content:''; position:absolute; bottom:-6px; left:50%;
  transform:translateX(-50%);
  border:4px solid transparent;
  border-top-color:rgba(255,255,255,.93);
}

/* Legend */
#legend {
  position:absolute; bottom:14px; left:12px;
  display:flex; gap:14px; z-index:20;
}
.leg { display:flex; align-items:center; gap:5px; color:#fff; font-size:11px; font-weight:700;
  text-shadow:0 1px 5px rgba(0,0,0,.9); }
.legdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* People btn */
#people-btn {
  position:absolute; bottom:62px; left:14px;
  background:rgba(40,24,10,.88);
  border:2px solid rgba(180,130,50,.7);
  border-radius:14px; color:#f5d890;
  font-family:'Baloo 2',cursive; font-size:13px; font-weight:700;
  padding:8px 16px; cursor:pointer;
  display:flex; align-items:center; gap:7px;
  box-shadow:0 4px 20px rgba(0,0,0,.6);
  z-index:20; transition:background .2s, transform .1s;
}
#people-btn:hover { background:rgba(60,38,16,.95); transform:scale(1.03); }

/* Done btn */
#done-btn {
  position:absolute; bottom:58px; right:16px;
  background:linear-gradient(135deg,#50d28c,#2aa860);
  border:none; border-radius:22px;
  color:#fff; font-family:'Baloo 2',cursive;
  font-size:15px; font-weight:700;
  padding:10px 22px; cursor:pointer;
  box-shadow:0 4px 22px rgba(50,200,120,.6);
  z-index:20; transition:transform .2s, opacity .2s;
}
#done-btn:hover { transform:scale(1.05); opacity:.92; }

/* People Panel */
#people-panel {
  position:absolute; top:0; right:-100%;
  width:88%; max-width:360px; height:100%;
  background:#fdf6e3; z-index:50;
  display:flex; flex-direction:column;
  transition:right .35s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 40px rgba(0,0,0,.7);
  border-radius:24px 0 0 24px;
}
#people-panel.open { right:0; }
.ptop { background:#2a1e10; padding:20px 18px 14px; border-radius:24px 0 0 0; position:relative; }
.ptop h2 { font-family:'Baloo 2',cursive; color:#f5d890; font-size:18px; }
#close-panel {
  position:absolute; top:14px; right:14px;
  background:rgba(255,255,255,.15); border:none; border-radius:50%;
  width:30px; height:30px; color:#f5d890; font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.ftabs { display:flex; gap:6px; flex-wrap:wrap; padding:10px 14px 6px; background:#f5ead0; border-bottom:1px solid #e8d8b8; }
.ftab { padding:4px 12px; border-radius:20px; font-size:11px; font-weight:800; border:none; cursor:pointer; font-family:'Nunito',sans-serif; transition:all .15s; }
.fa { background:#3a5bd9; color:#fff; }
.fc { background:#ffd0de; color:#c0305a; }
.fs { background:#fff0b0; color:#8a6a00; }
.ff { background:#d0f5e0; color:#1a6a40; }
.fo { background:#ede3d2; color:#8a7a60; }
.plist { overflow-y:auto; flex:1; }
.prow { display:flex; align-items:center; padding:10px 16px; border-bottom:1px solid #f0e8d8; cursor:pointer; transition:background .15s; }
.prow:hover { background:#fdf0dc; }
.pav { width:42px; height:42px; border-radius:50%; overflow:hidden; margin-right:10px; flex-shrink:0; border:2px solid #ddd; }
.pav img { width:100%; height:100%; object-fit:cover; }
.pinfo { flex:1; }
.pname { font-size:14px; font-weight:800; color:#2a1e0e; }
.prel  { font-size:11px; color:#8a7a60; display:flex; align-items:center; gap:4px; margin-top:1px; }
.pdot  { width:7px; height:7px; border-radius:50%; }
.ptime { font-size:11px; color:#b09070; margin-left:auto; padding-left:6px; white-space:nowrap; }
.pheart { margin-left:6px; font-size:14px; }
.pchev { color:#c0a880; margin-left:4px; }
.padd { padding:12px 16px; border-top:1px solid #e8dece; }
.padd-btn { width:100%; padding:10px; background:linear-gradient(135deg,#3a5040,#2a3e30); color:#c0f0b0; border:none; border-radius:20px; font-family:'Baloo 2',cursive; font-size:13px; font-weight:700; cursor:pointer; }
.padd-btn:hover { opacity:.85; }

/* Detail Panel */
#detail-panel { position:absolute; inset:0; background:rgba(0,0,0,.6); z-index:60; display:none; align-items:flex-end; justify-content:center; }
#detail-panel.open { display:flex; }
.dsheet { background:#fdf6e3; width:100%; border-radius:28px 28px 0 0; padding:0 0 24px; animation:slideUp .3s ease; max-height:88vh; overflow-y:auto; }
@keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
.dhead { display:flex; align-items:center; padding:16px 18px 12px; background:#2a1e10; border-radius:28px 28px 0 0; gap:14px; position:relative; }
.dav { width:56px; height:56px; border-radius:50%; overflow:hidden; border:3px solid #f5d890; flex-shrink:0; }
.dav img { width:100%; height:100%; object-fit:cover; }
.dinfo h3 { font-family:'Baloo 2',cursive; color:#f5d890; font-size:19px; }
.dbadge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:700; background:#ffd0de; color:#c0305a; margin-top:3px; }
.dlast { font-size:11px; color:#a09080; margin-top:3px; }
.dlast span { color:#e08080; font-weight:700; }
#close-detail { position:absolute; top:12px; right:14px; background:rgba(255,255,255,.15); border:none; border-radius:50%; width:30px; height:30px; color:#f5d890; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.dsec { padding:14px 18px 0; }
.dsec h4 { font-size:13px; font-weight:800; color:#5a4a30; margin-bottom:4px; }
.dsec .sub { font-size:11px; color:#9a8a70; margin-bottom:8px; }
.slrow { display:flex; align-items:center; gap:8px; }
.sllbl { font-size:11px; color:#9a8a70; white-space:nowrap; }
input[type=range] { flex:1; -webkit-appearance:none; height:7px; border-radius:4px; background:linear-gradient(to right,#3a7a30,#e05050); outline:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; background:radial-gradient(circle,#ff6060,#c03030); border-radius:50%; border:2px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.4); }
.frow { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.fbtn { padding:5px 14px; border-radius:16px; border:1.5px solid #d0c0a0; background:#fff; font-family:'Nunito',sans-serif; font-size:12px; font-weight:700; color:#7a6a50; cursor:pointer; transition:all .15s; }
.fbtn.active { background:#ffd0de; border-color:#e08080; color:#c0305a; }
textarea.dnotes { width:100%; height:62px; border:1.5px solid #d8c8a8; border-radius:12px; background:#fff9f0; padding:8px 10px; font-family:'Nunito',sans-serif; font-size:12px; color:#5a4a30; resize:none; outline:none; margin-top:6px; }
.dsave { display:block; width:calc(100% - 36px); margin:16px 18px 0; padding:12px; background:linear-gradient(135deg,#3a5040,#2a3e30); color:#c0f0b0; border:none; border-radius:22px; font-family:'Baloo 2',cursive; font-size:15px; font-weight:700; cursor:pointer; }
.dsave:hover { opacity:.88; }
</style>
</head>
<body>
<div id="app">
  <div id="bg"></div>
  <div id="title-bar">
    <h1>Understanding Social Life</h1>
    <p>Everyone has a special place in our life.</p>
  </div>
  <button id="help-btn" onclick="showHelp()">?</button>
  <div id="me-label">Me</div>
  <button id="people-btn" onclick="togglePanel()">👥 People List</button>
  <button id="done-btn" onclick="onDone()">Done</button>
  <div id="legend">
    <div class="leg"><div class="legdot" style="background:#ff82aa"></div>Close to me</div>
    <div class="leg"><div class="legdot" style="background:#f9d14a"></div>Somewhat close</div>
    <div class="leg"><div class="legdot" style="background:#50d28c"></div>Farther away</div>
  </div>

  <div id="people-panel">
    <div class="ptop"><h2>People in your life</h2><button id="close-panel" onclick="togglePanel()">×</button></div>
    <div class="ftabs">
      <button class="ftab fa" onclick="setFilter('all',this)">All</button>
      <button class="ftab fo" onclick="setFilter('close',this)">Close</button>
      <button class="ftab fo" onclick="setFilter('somewhat',this)">Somewhat Close</button>
      <button class="ftab fo" onclick="setFilter('farther',this)">Farther</button>
    </div>
    <div class="plist" id="plist"></div>
    <div class="padd"><button class="padd-btn" onclick="addPerson()">+ Add Person</button></div>
  </div>

  <div id="detail-panel" onclick="bgClick(event)">
    <div class="dsheet">
      <button id="close-detail" onclick="closeDetail()">×</button>
      <div class="dhead">
        <div class="dav"><img id="dp-img" src="" alt=""/></div>
        <div class="dinfo">
          <h3 id="dp-name"></h3>
          <div class="dbadge" id="dp-badge"></div>
          <div class="dlast">Last connected <span id="dp-last"></span></div>
        </div>
        <div style="margin-left:auto;font-size:30px">🪴</div>
      </div>
      <div class="dsec">
        <h4>Closeness</h4><p class="sub">Move person closer or farther</p>
        <div class="slrow">
          <span class="sllbl">Farther</span>
          <input type="range" id="dp-slider" min="0" max="2" step="1" value="1" oninput="updateCircle(this.value)">
          <span class="sllbl">Closer</span>
        </div>
      </div>
      <div class="dsec">
        <h4>How often do you connect?</h4>
        <div class="frow">
          <button class="fbtn" onclick="setFreq(this,'Daily')">Daily</button>
          <button class="fbtn active" onclick="setFreq(this,'Weekly')">Weekly</button>
          <button class="fbtn" onclick="setFreq(this,'Monthly')">Monthly</button>
          <button class="fbtn" onclick="setFreq(this,'Rarely')">Rarely</button>
        </div>
      </div>
      <div class="dsec">
        <h4>Notes (optional)</h4>
        <textarea class="dnotes" id="dp-notes" placeholder="Write something you appreciate..."></textarea>
      </div>
      <button class="dsave" onclick="saveDetail()">Save changes</button>
    </div>
  </div>
</div>

<script>
const circleOrder  = ['close','somewhat','farther'];
const circleColors = {close:'#ff82aa', somewhat:'#f9d14a', farther:'#50d28c'};
const circleLabel  = {close:'Close Friend', somewhat:'Somewhat Close', farther:'Farther Away'};
const ringClass    = {close:'ring-close', somewhat:'ring-somewhat', farther:'ring-farther'};

let people = [
  {id:1, name:'Aarav',  relation:'Close Friend',   circle:'close',    last:'2 days ago',   freq:'Weekly',  notes:''},
  {id:2, name:'Meera',  relation:'Best Friend',    circle:'close',    last:'5 days ago',   freq:'Weekly',  notes:''},
  {id:3, name:'Riya',   relation:'Close Friend',   circle:'close',    last:'1 week ago',   freq:'Monthly', notes:''},
  {id:4, name:'Kabir',  relation:'Brother',        circle:'somewhat', last:'2 weeks ago',  freq:'Daily',   notes:''},
  {id:5, name:'Tina',   relation:'College Friend', circle:'somewhat', last:'3 weeks ago',  freq:'Monthly', notes:''},
  {id:6, name:'Neha',   relation:'Cousin',         circle:'somewhat', last:'1 month ago',  freq:'Rarely',  notes:''},
  {id:7, name:'Vikram', relation:'Work Friend',    circle:'farther',  last:'1 month ago',  freq:'Rarely',  notes:''},
  {id:8, name:'Ishita', relation:'Friend',         circle:'farther',  last:'2 months ago', freq:'Rarely',  notes:''},
];

let editId = null, filterMode = 'all';

function getAvatar(name) {
  return `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(name)}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf&backgroundType=gradientLinear`;
}

// IMAGE MEASUREMENTS (1254x1254 image):
// Ring center: x=646px (51.5%), y=655px (52.2%)
// Ring radii:  close=145px, somewhat=263px, farther=355px
// As % of image width: 11.57%, 20.97%, 28.31%

function getLayout() {
  const app = document.getElementById('app');
  const W = app.offsetWidth;
  const H = app.offsetHeight;
  
  // background-size: cover on a square image
  // displayed square size = min(W, H) ... wait, cover means fill both
  // For cover: scale = max(W/1254, H/1254)
  const scale = Math.max(W / 1254, H / 1254);
  const dispW = 1254 * scale;
  const dispH = 1254 * scale;
  
  // background-position: 51.5% 52.2% means:
  // offsetX = (dispW - W) * 0.515
  // offsetY = (dispH - H) * 0.522
  const offX = (dispW - W) * 0.515;
  const offY = (dispH - H) * 0.522;
  
  // Center in screen coords
  const cx = 646 * scale - offX;
  const cy = 655 * scale - offY;
  
  // Radii in screen coords
  const r_close    = 145 * scale;
  const r_somewhat = 263 * scale;
  const r_farther  = 355 * scale;
  
  return { cx, cy, r_close, r_somewhat, r_farther };
}

function placeAvatars() {
  const app = document.getElementById('app');
  document.querySelectorAll('.person-bubble').forEach(e => e.remove());

  const L = getLayout();
  
  // Position "Me" label just above center
  const ml = document.getElementById('me-label');
  ml.style.left = L.cx + 'px';
  ml.style.top  = (L.cy - 55) + 'px';

  const radii = { close: L.r_close, somewhat: L.r_somewhat, farther: L.r_farther };
  const groups = { close:[], somewhat:[], farther:[] };
  people.forEach(p => groups[p.circle].push(p));

  // Start angles: spread people nicely, avoid bottom gate area
  const startAngle = { close: -Math.PI * 0.5, somewhat: -Math.PI * 0.65, farther: -Math.PI * 0.75 };

  Object.keys(groups).forEach(circle => {
    const ps = groups[circle];
    if (!ps.length) return;
    const r = radii[circle];
    const start = startAngle[circle];

    ps.forEach((person, i) => {
      const angle = start + (2 * Math.PI / ps.length) * i;
      const x = L.cx + r * Math.cos(angle);
      const y = L.cy + r * Math.sin(angle);

      const div = document.createElement('div');
      div.className = `person-bubble ${ringClass[circle]}`;
      div.style.left = x + 'px';
      div.style.top  = y + 'px';
      div.dataset.id = person.id;

      const img = document.createElement('img');
      img.src = getAvatar(person.name);
      img.alt = person.name;
      div.appendChild(img);

      const nm = document.createElement('div');
      nm.className = 'bname';
      nm.textContent = person.name;
      div.appendChild(nm);

      div.onclick = () => openDetail(person.id);
      app.appendChild(div);
    });
  });
}

window.addEventListener('load', placeAvatars);
window.addEventListener('resize', placeAvatars);

function renderList() {
  const list = document.getElementById('plist');
  list.innerHTML = '';
  const filtered = filterMode === 'all' ? people : people.filter(p => p.circle === filterMode);
  filtered.forEach(p => {
    const row = document.createElement('div');
    row.className = 'prow';
    row.innerHTML = `
      <div class="pav"><img src="${getAvatar(p.name)}" alt="${p.name}"/></div>
      <div class="pinfo">
        <div class="pname">${p.name}</div>
        <div class="prel"><span class="pdot" style="background:${circleColors[p.circle]}"></span>${p.relation}</div>
      </div>
      <div class="ptime">${p.last}</div>
      <div class="pheart">${p.circle==='close'?'❤️':'🤍'}</div>
      <div class="pchev">›</div>`;
    row.onclick = () => { openDetail(p.id); togglePanel(); };
    list.appendChild(row);
  });
}

function setFilter(mode, btn) {
  filterMode = mode;
  document.querySelectorAll('.ftab').forEach(b => b.className='ftab fo');
  const map = {all:'fa',close:'fc',somewhat:'fs',farther:'ff'};
  btn.className = `ftab ${map[mode]}`;
  renderList();
}

function togglePanel() {
  const p = document.getElementById('people-panel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) renderList();
}

function openDetail(id) {
  editId = id;
  const p = people.find(x => x.id === id);
  document.getElementById('dp-img').src   = getAvatar(p.name);
  document.getElementById('dp-name').textContent  = p.name;
  document.getElementById('dp-badge').textContent = p.relation;
  document.getElementById('dp-last').textContent  = p.last;
  document.getElementById('dp-slider').value = circleOrder.indexOf(p.circle);
  document.getElementById('dp-notes').value  = p.notes || '';
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('active', b.textContent === p.freq));
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() { document.getElementById('detail-panel').classList.remove('open'); }
function bgClick(e) { if (e.target === document.getElementById('detail-panel')) closeDetail(); }

function updateCircle(val) {
  if (editId === null) return;
  people.find(x => x.id === editId).circle = circleOrder[+val];
  document.getElementById('dp-badge').textContent = circleLabel[circleOrder[+val]];
}

function setFreq(btn, f) {
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (editId !== null) people.find(x => x.id === editId).freq = f;
}

function saveDetail() {
  const p = people.find(x => x.id === editId);
  if (!p) return;
  p.notes = document.getElementById('dp-notes').value;
  p.freq  = document.querySelector('.fbtn.active')?.textContent || p.freq;
  placeAvatars(); renderList(); closeDetail();
}

function showHelp() {
  alert('🌿 Understanding Social Life\n\n• Tap any person to edit their closeness\n• Use "People List" to see everyone\n• Drag the slider to move someone closer or farther\n• Change how often you connect\n• Add notes about what you appreciate about them');
}

function onDone() {
  alert('✅ Your social circles are saved!');
}

function addPerson() {
  const name = prompt('Name:'); if (!name) return;
  const rel  = prompt('Relationship:', 'Friend') || 'Friend';
  people.push({ id:Date.now(), name, relation:rel, circle:'farther', last:'Just now', freq:'Rarely', notes:'' });
  placeAvatars(); renderList();
}
</script>
</body>
</html>
