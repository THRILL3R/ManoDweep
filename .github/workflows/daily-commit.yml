name: Daily Contribution

on:
  schedule:
    - cron: '30 6 * * *'  # Every day at 6:30 AM UTC (12:00 PM IST)
  workflow_dispatch:        # Allow manual trigger too

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make daily update
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> .github/daily-log.txt

      - name: Commit and push
        run: |
          git config user.name "Sanket"
          git config user.email "sanket.dekaglgt@gmail.com"
          git add .github/daily-log.txt
          git commit -m "chore: daily update $(date -u '+%Y-%m-%d')"
          git push
